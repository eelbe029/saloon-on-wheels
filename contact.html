<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saloon On Wheels - Contactez-Nous</title>

    <link rel="icon" type="image/png" href="assets/favico.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="body-bg-image text-light">
    <nav
      class="navbar navbar-expand-lg navbar-dark bg-dark py-0 border-bottom border-secondary sticky-top"
    >
      <div class="container align-items-center">
        <a class="navbar-brand py-0" href="index.html">
          <img
            src="assets/logo.png"
            alt="Saloon On Wheels Logo"
            height="125"
            class="d-inline-block align-middle logo-golden-border"
          />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-center"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="services.html">Nos Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="experts.html">Nos Experts</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="localisation.html">Nos Magasins</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active text-warning" href="contact.html"
                >Contactez-Nous</a
              >
            </li>
          </ul>
        </div>
        <a
          href="reservation.html"
          class="btn btn-warning btn-lg fw-bold text-dark px-4 shadow-sm"
          >Réserver !</a
        >
      </div>
    </nav>

    <div class="container mb-5">
      <div
        class="bg-dark p-5 rounded-bottom-4 shadow-lg border border-secondary border-top-0"
        data-bs-theme="dark"
      >
        <h2 class="text-center fw-bold mb-5 display-5 text-white">
          Contactez-nous !
        </h2>
        <div class="row">
          <div class="col-lg-5 mb-5 mb-lg-0 pe-lg-5">
            <h4 class="text-white mb-4 lh-base">
              Nous sommes toujours à votre disposition :
            </h4>
            <div class="d-flex flex-column gap-3 mt-4">
              <div class="d-flex align-items-center">
                <span class="fs-4 me-3">📞</span>
                <div>
                  <p class="text-warning mb-0 fw-bold">Numéro de téléphone</p>
                  <p class="fs-5 mb-0 text-light opacity-75">(613) 555-0198</p>
                </div>
              </div>

              <div class="d-flex align-items-center">
                <span class="fs-4 me-3">✉️</span>
                <div>
                  <p class="text-warning mb-0 fw-bold">Adresse e-mail</p>
                  <p class="fs-5 mb-0">
                    <a
                      href="mailto:contact@saloononwheels.ca"
                      class="text-light opacity-75 text-decoration-none hover-underline"
                      >contact@saloononwheels.ca</a
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>

          <div class="col-lg-7">
            <div
              class="bg-secondary bg-opacity-10 p-4 rounded-4 border border-secondary"
            >
              <form action="#" method="POST">
                <div class="row mb-3">
                  <div class="col-md-6 mb-3 mb-md-0">
                    <label for="nomPrenom" class="form-label text-light"
                      >Nom et Prénom</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="nomPrenom"
                      placeholder="Votre nom complet"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="telephone" class="form-label text-light"
                      >Numéro de téléphone</label
                    >
                    <input
                      type="tel"
                      class="form-control"
                      id="telephone"
                      placeholder="(123) 456-7890"
                    />
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-md-6 mb-3 mb-md-0">
                    <label for="email" class="form-label text-light"
                      >Email</label
                    >
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      placeholder="votre@email.com"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="sujet" class="form-label text-light"
                      >Sujet</label
                    >
                    <select class="form-select" id="sujet">
                      <option value="" selected disabled>
                        Choisissez un sujet...
                      </option>
                      <option value="devis">Demande de devis</option>
                      <option value="question">Question sur un service</option>
                      <option value="suivi">Suivi de réservation</option>
                      <option value="autre">Autre</option>
                    </select>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="message" class="form-label text-light"
                    >Message</label
                  >
                  <textarea
                    class="form-control"
                    id="message"
                    rows="5"
                    placeholder="Comment pouvons-nous vous aider ?"
                    required
                  ></textarea>
                </div>

                <div class="d-grid">
                  <button
                    type="submit"
                    class="btn btn-warning btn-lg fw-bold text-dark shadow"
                  >
                    Soumettre
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
